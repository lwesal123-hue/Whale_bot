name: HyperStats Telegram Bot

on:
  schedule:
    - cron: "7,37 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: hyperstats-bot
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Abhaengigkeiten installieren
        run: pip install -r requirements.txt

      - name: Bot ausfuehren
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot.py

      - name: State speichern
        run: |
          if [[ -n "$(git status --porcelain state.json)" ]]; then
            git config user.name "hyperstats-bot"
            git config user.email "bot@users.noreply.github.com"
            git add state.json
            git commit -m "update state [skip ci]"
            git push
          else
            echo "keine State-Aenderung"
          fi
